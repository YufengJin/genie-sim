# Fleet configuration for offline replay mode
# Each robot maps to a LeRobot dataset on disk.
# Switching robots in the UI switches the replayed dataset.
#
# Dataset host path: /mnt/hdd18T/datasets/AgiBotWorld/Reasoning2Action-Sim/
# Mounted in container at: /datasets/

fps: 10           # Playback frame rate
max_episodes: 20  # Max episodes per robot (0 = all). Per-robot override supported.

# Default camera mapping — AgiBotWorld / ACoT-VLA format
# Keys must match DASHBOARD_CONFIG["cameras"] in config.py
default_camera_mapping:
  head_front_camera: "observation.images.top_head"
  left_camera: "observation.images.hand_left"
  right_camera: "observation.images.hand_right"

robots:
  # sorting_packages (3 robots)
  robot_00:
    repo_id: "/datasets/sorting_packages_part_1"
    task_name: "sorting_packages"
